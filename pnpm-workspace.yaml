# Single-package repo; this file exists for pnpm settings only.

# Dependencies whose install scripts may run (pnpm blocks all others).
allowBuilds:
  # esbuild's postinstall installs the platform-specific binary.
  esbuild: true
  # spawn-sync's build script is a no-op shim on modern Node.
  spawn-sync: false

# Packages allowed despite pnpm's minimum-release-age gate.
minimumReleaseAgeExclude:
  - '@vitest/coverage-v8@4.1.10'
  - '@vitest/expect@4.1.10'
  - '@vitest/mocker@4.1.10'
  - '@vitest/pretty-format@4.1.10'
  - '@vitest/runner@4.1.10'
  - '@vitest/snapshot@4.1.10'
  - '@vitest/spy@4.1.10'
  - '@vitest/utils@4.1.10'
  - vitest@4.1.10
  # typescript-eslint's routine weekly (Monday) release, reviewed in PR #33.
  - '@typescript-eslint/eslint-plugin@8.63.0'
  - '@typescript-eslint/parser@8.63.0'
  - '@typescript-eslint/project-service@8.63.0'
  - '@typescript-eslint/scope-manager@8.63.0'
  - '@typescript-eslint/tsconfig-utils@8.63.0'
  - '@typescript-eslint/type-utils@8.63.0'
  - '@typescript-eslint/types@8.63.0'
  - '@typescript-eslint/typescript-estree@8.63.0'
  - '@typescript-eslint/utils@8.63.0'
  - '@typescript-eslint/visitor-keys@8.63.0'
  - typescript-eslint@8.63.0
